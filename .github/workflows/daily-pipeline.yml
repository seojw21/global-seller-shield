name: Daily Content Pipeline & Deploy

# Sync Token: 2026-03-11T17:10:00Z (Hard Refresh)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate automated content & insights
        run: npm run generate
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Build production bundle
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Deploy to Firebase Hosting
        # 사용자가 방금 만든 FIREBASE_TOKEN을 사용하여 배포하도록 방식을 변경합니다.
        # 이 방식이 초보자분들에게는 더 직관적이고 설정이 쉽습니다.
        run: npx firebase-tools deploy --only hosting --project seraphic-lock-460314-f9
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
