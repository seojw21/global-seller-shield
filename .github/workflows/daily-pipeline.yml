name: "Daily Content Pipeline & Deploy"

on:
  schedule:
    # 매일 오전 08:00 KST (UTC 23:00 전날)
    - cron: "0 23 * * *"
  workflow_dispatch: # 수동 실행도 가능

env:
  NODE_VERSION: "20"

jobs:
  generate-and-deploy:
    name: "Generate Content → Build → Deploy"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate automated content & insights
        run: npm run generate
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Build production bundle
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Verify Secrets
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT is MISSING!"
            exit 1
          else
            echo "✅ FIREBASE_SERVICE_ACCOUNT is present."
          fi
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseToken: '${{ secrets.FIREBASE_TOKEN }}'
          projectId: 'seraphic-lock-460314-f9'
          channelId: live
