        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(30,41,59,0.9));
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 2rem;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 2rem;
            color: #f87171;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        .badge .dot {
            width: 6px; height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .counter {
            color: rgba(148,163,184,0.6);
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        h1 {
            color: #f1f5f9;
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 1.25rem;
        }
        .description {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(148,163,184,0.1);
        }
        .source {
            color: rgba(148,163,184,0.5);
            font-size: 0.6rem;
        }
        .brand {
            color: #38bdf8;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 0.05em;
        }
        .cta {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }
        .cta:hover { transform: scale(1.02); }
